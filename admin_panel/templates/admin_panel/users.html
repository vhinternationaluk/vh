{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Users Management - VHInternaltional Admin</title>
    <link rel="stylesheet" href="{% static 'admin_panel/css/admin.css' %}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="admin-container">
        <!-- Header -->
        <header class="admin-header">
            <div class="header-content">
                <div class="logo-section">
                    <div class="logo-icon">
                        <i class="fas fa-home"></i>
                        <i class="fas fa-pencil-alt"></i>
                    </div>
                    <div class="logo-text">
                        <h1>VHInternaltional</h1>
                        <p>MAKE HOME BEAUTIFUL</p>
                    </div>
                </div>
                <div class="header-actions">
                    <span class="user-name">{{ user.username }}</span>
                    <a href="{% url 'account:signout' %}" class="logout-btn">
                        <i class="fas fa-sign-out-alt"></i> Logout
                    </a>
                </div>
            </div>
        </header>

        <!-- Navigation Tabs -->
        <nav class="admin-nav">
            <a href="/" class="nav-tab">
                <i class="fas fa-home"></i> Home
            </a>
            <a href="{% url 'admin_panel:dashboard' %}" class="nav-tab">
                <i class="fas fa-tachometer-alt"></i> Dashboard
            </a>
            <a href="{% url 'admin_panel:products' %}" class="nav-tab">
                <i class="fas fa-box"></i> Products
            </a>
            <a href="{% url 'admin_panel:categories' %}" class="nav-tab">
                <i class="fas fa-gem"></i> Categories
            </a>
            <a href="{% url 'admin_panel:orders' %}" class="nav-tab">
                <i class="fas fa-shopping-cart"></i> Orders
            </a>
            <a href="{% url 'admin_panel:users' %}" class="nav-tab active">
                <i class="fas fa-users"></i> Users
            </a>
        </nav>

        <!-- Main Content -->
        <main class="admin-main">
            <div class="page-header">
                <h2>Users Management</h2>
                <button class="refresh-btn" onclick="loadUsers()">
                    <i class="fas fa-sync-alt"></i> Refresh
                </button>
            </div>

            <!-- Error Message -->
            <div class="error-message" id="errorMessage" style="display: none;">
                <span id="errorText"></span>
                <button class="retry-btn" onclick="loadUsers()">Retry</button>
            </div>

            <!-- Search and Filters -->
            <div class="search-bar">
                <div class="search-input-wrapper">
                    <i class="fas fa-search"></i>
                    <input type="text" id="searchInput" placeholder="Search users..." onkeyup="handleSearch()">
                </div>
                <select class="filter-select" id="userTypeFilter" onchange="loadUsers()">
                    <option value="all">All User Types</option>
                    <option value="common">Common Users</option>
                    <option value="admin">Admin</option>
                    <option value="superadmin">Super Admin</option>
                </select>
                <a href="{% url 'admin_panel:add-user' %}" class="add-btn">
                    <i class="fas fa-plus"></i> Add User
                </a>
            </div>

            <!-- Users Table -->
            <div class="table-container">
                <table class="data-table" id="usersTable">
                    <thead>
                        <tr>
                            <th>Username</th>
                            <th>Email</th>
                            <th>Name</th>
                            <th>Mobile</th>
                            <th>User Type</th>
                            <th>Status</th>
                            <th>Staff</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="usersTableBody">
                        <tr>
                            <td colspan="8" class="loading">Loading users...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <script>
        let searchTimeout;

        function getCookie(name) {
            let cookieValue = null;
            if (document.cookie && document.cookie !== '') {
                const cookies = document.cookie.split(';');
                for (let i = 0; i < cookies.length; i++) {
                    const cookie = cookies[i].trim();
                    if (cookie.substring(0, name.length + 1) === (name + '=')) {
                        cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                        break;
                    }
                }
            }
            return cookieValue;
        }

        async function loadUsers() {
            const search = document.getElementById('searchInput').value;
            const userType = document.getElementById('userTypeFilter').value;
            const tbody = document.getElementById('usersTableBody');
            const errorMessage = document.getElementById('errorMessage');
            const errorText = document.getElementById('errorText');

            try {
                tbody.innerHTML = '<tr><td colspan="8" class="loading">Loading users...</td></tr>';
                errorMessage.style.display = 'none';

                let url = '/api/admin/users/';
                const params = new URLSearchParams();
                if (search) params.append('search', search);
                if (userType !== 'all') params.append('user_type', userType);
                if (params.toString()) url += '?' + params.toString();

                const response = await fetch(url, {
                    headers: {
                        'X-CSRFToken': getCookie('csrftoken')
                    },
                    credentials: 'same-origin'
                });

                if (!response.ok) {
                    throw new Error('No authentication token available');
                }

                const data = await response.json();

                if (data.error) {
                    throw new Error(data.error);
                }

                if (data.users && data.users.length > 0) {
                    tbody.innerHTML = data.users.map(user => {
                        const fullName = (user.first_name || '') + ' ' + (user.last_name || '');
                        return `
                        <tr>
                            <td>${user.username}</td>
                            <td>${user.email}</td>
                            <td>${fullName.trim() || 'N/A'}</td>
                            <td>${user.mobile || 'N/A'}</td>
                            <td>
                                <span class="user-type-badge ${user.user_type}">
                                    ${user.user_type.charAt(0).toUpperCase() + user.user_type.slice(1)}
                                </span>
                            </td>
                            <td>
                                <span class="status-badge ${user.is_active ? 'active' : 'inactive'}">
                                    ${user.is_active ? 'Active' : 'Inactive'}
                                </span>
                            </td>
                            <td>
                                <span class="status-badge ${user.is_staff ? 'active' : 'inactive'}">
                                    ${user.is_staff ? 'Yes' : 'No'}
                                </span>
                            </td>
                            <td>
                                <a href="/admin-panel/users/${user.id}/update/" class="action-btn edit">
                                    <i class="fas fa-edit"></i>
                                </a>
                                <button onclick="deleteUser('${user.id}')" class="action-btn delete">
                                    <i class="fas fa-trash"></i>
                                </button>
                            </td>
                        </tr>
                    `;
                    }).join('');
                } else {
                    tbody.innerHTML = '<tr><td colspan="8" class="no-data">No users found</td></tr>';
                }

            } catch (error) {
                errorText.textContent = `Error loading users: ${error.message}`;
                errorMessage.style.display = 'flex';
                tbody.innerHTML = '<tr><td colspan="8" class="error">Failed to load users</td></tr>';
            }
        }

        function handleSearch() {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(loadUsers, 500);
        }

        async function deleteUser(userId) {
            if (!confirm('Are you sure you want to delete this user?')) {
                return;
            }

            try {
                const response = await fetch(`/api/admin/users/${userId}/delete/`, {
                    method: 'DELETE',
                    headers: {
                        'X-CSRFToken': getCookie('csrftoken')
                    },
                    credentials: 'same-origin'
                });

                const data = await response.json();

                if (response.ok) {
                    alert('User deleted successfully');
                    loadUsers();
                } else {
                    alert('Error: ' + (data.error || 'Failed to delete user'));
                }
            } catch (error) {
                alert('An error occurred: ' + error.message);
            }
        }

        // Load users on page load
        document.addEventListener('DOMContentLoaded', loadUsers);
    </script>
</body>
</html>
